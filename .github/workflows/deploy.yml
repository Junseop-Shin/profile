name: Deploy to Home Server

on:
  push:
    branches:
      - main
    paths:
      - "next/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: next/package-lock.json

      - name: Setup .npmrc for GitHub Packages
        run: |
          echo "@junseop-shin:registry=https://npm.pkg.github.com" >> next/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> next/.npmrc

      - name: Install dependencies
        working-directory: next
        run: npm ci

      - name: Build
        working-directory: next
        run: npm run build

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          cat >> ~/.ssh/config <<EOF
          Host ${{ secrets.DEPLOY_HOST }}
            ProxyCommand cloudflared access ssh --hostname %h
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking no
          EOF

      - name: Sync build output
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no" \
            next/.next/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/next/.next/

      - name: Sync public assets
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no" \
            next/public/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/next/public/

      - name: Reload pm2
        run: |
          ssh -i ~/.ssh/id_deploy \
            -o ProxyCommand="cloudflared access ssh --hostname ${{ secrets.DEPLOY_HOST }}" \
            -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "pm2 reload profile-next --update-env || pm2 start ${{ secrets.DEPLOY_PATH }}/next/ecosystem.config.js && pm2 save"
