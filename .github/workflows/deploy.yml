name: Deploy to Home Server

on:
  push:
    branches:
      - main
    paths:
      - "next/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: next/package-lock.json

      - name: Setup .npmrc for GitHub Packages
        run: |
          echo "@junseop-shin:registry=https://npm.pkg.github.com" >> next/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> next/.npmrc

      - name: Install dependencies
        working-directory: next
        run: npm ci

      - name: Create .env.local
        working-directory: next
        run: |
          echo "NEXT_PUBLIC_INGESTOR_URL=${{ secrets.NEXT_PUBLIC_INGESTOR_URL }}" > .env.local

      - name: Build
        working-directory: next
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Sync build output
        run: |
          SSH="ssh -i ~/.ssh/id_deploy -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          $SSH "pm2 stop profile-next || exit 0"
          $SSH "powershell -NoProfile -Command \"Start-Sleep -Seconds 2; Remove-Item -Path '${{ secrets.DEPLOY_PATH }}\\next' -Force -Recurse -ErrorAction SilentlyContinue; New-Item -ItemType Directory -Force -Path '${{ secrets.DEPLOY_PATH }}\\next\\.next\\static','${{ secrets.DEPLOY_PATH }}\\next\\public' | Out-Null\""
          tar czf - -C next/.next/standalone . | $SSH "tar xzf - -C ${{ secrets.DEPLOY_PATH }}/next"
          tar czf - -C next/.next/static . | $SSH "tar xzf - -C ${{ secrets.DEPLOY_PATH }}/next/.next/static"
          tar czf - -C next/public . | $SSH "tar xzf - -C ${{ secrets.DEPLOY_PATH }}/next/public"
          tar czf - -C next ecosystem.config.js | $SSH "tar xzf - -C ${{ secrets.DEPLOY_PATH }}/next"

      - name: Reload pm2
        run: |
          ssh -i ~/.ssh/id_deploy \
            -p ${{ secrets.DEPLOY_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }}\\next && pm2 reload profile-next --update-env || cd ${{ secrets.DEPLOY_PATH }}\\next && pm2 start ecosystem.config.js && pm2 save && schtasks /run /tn PM2-Resurrect"
